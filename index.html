<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>World Cup Penalty Shootout</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 100%;
            max-height: 700px;
            background: #1e3f20; /* Pitch green */
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* Screen Styles */
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            background: linear-gradient(135deg, #124e28 0%, #072513 100%);
            box-sizing: border-box;
            padding: 20px;
            text-align: center;
        }

        #gameScreen {
            background: transparent;
            display: none;
            pointer-events: none;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
            color: #f7b500;
        }

        p { margin: 5px 0 20px 0; color: #ddd; }

        /* Nation Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
            box-sizing: border-box;
        }

        .nation-btn {
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 15px 5px;
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .nation-btn:active, .nation-btn.selected {
            background: #f7b500;
            color: #072513;
            border-color: #fff;
            transform: scale(0.95);
        }

        .flag {
            font-size: 30px;
            line-height: 1;
        }

        /* UI elements */
        button.action-btn {
            background: #f7b500;
            color: #072513;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            margin-top: 20px;
        }

        #ingameUI {
            position: absolute;
            top: 15px; width: 100%;
            display: flex;
            justify-content: space-around;
            font-size: 18px;
            font-weight: bold;
            z-index: 5;
            text-shadow: 1px 1px 3px #000;
        }

        #canvasContainer {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #instructions {
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            text-shadow: 1px 1px 2px #000;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        
        <!-- NATION SELECTOR SCREEN -->
        <div id="selectorScreen" class="screen">
            <h1>WORLD CUP 2026</h1>
            <p>Select your nation to take the pitch</p>
            <div class="grid" id="nationGrid"></div>
            <button class="action-btn" id="startBtn" disabled style="opacity: 0.5;">PLAY</button>
        </div>

        <!-- GAMEPLAY SCREEN -->
        <div id="ingameUI">
            <div>TEAM: <span id="uiTeam">---</span></div>
            <div>SCORE: <span id="uiScore">0</span></div>
            <div>STREAK: <span id="uiStreak">0</span></div>
        </div>
        <div id="instructions">Swipe / Flick the ball forward to shoot!</div>
        <div id="canvasContainer">
            <canvas id="gameCanvas"></canvas>
        </div>

        <!-- GAME OVER SCREEN -->
        <div id="gameOverScreen" class="screen" style="display: none;">
            <h1 style="color: #ff3333;">OUT OF THE CUP!</h1>
            <p id="finalScoreText">You scored 0 penalties.</p>
            <button class="action-btn" onclick="showSelector()">TRY AGAIN</button>
        </div>

    </div>

    <script>
        // List of Teams
        const nations = [
            { name: 'Argentina', flag: '🇦🇷', color: '#74ACDF' },
            { name: 'Brazil', flag: '🇧🇷', color: '#009c3b' },
            { name: 'England', flag: '🏴󠁧󠁢󠁥󠁮󠁧󠁿', color: '#ffffff' },
            { name: 'France', flag: '🇫🇷', color: '#002395' },
            { name: 'Germany', flag: '🇩🇪', color: '#ffffff' },
            { name: 'Spain', flag: '🇪🇸', color: '#c60b1e' },
            { name: 'USA', flag: '🇺🇸', color: '#0a3161' },
            { name: 'Mexico', flag: '🇲🇽', color: '#006847' },
            { name: 'Portugal', flag: '🇵🇹', color: '#046307' }
        ];

        let selectedNation = null;
        let score = 0;
        let streak = 0;

        // Setup Nation Grid
        const grid = document.getElementById('nationGrid');
        const startBtn = document.getElementById('startBtn');

        nations.forEach(nation => {
            const btn = document.createElement('div');
            btn.className = 'nation-btn';
            btn.innerHTML = `<span class="flag">${nation.flag}</span><span>${nation.name}</span>`;
            btn.addEventListener('click', () => {
                document.querySelectorAll('.nation-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedNation = nation;
                startBtn.disabled = false;
                startBtn.style.opacity = "1";
            });
            grid.appendChild(btn);
        });

        startBtn.addEventListener('click', startGame);

        // --- ENGINE & GAMEPLAY ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Resize Engine Canvas properly
        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Game Entities
        let ball, keeper, goal, gameState;
        
        function initEntities() {
            goal = {
                x: canvas.width * 0.15,
                y: 120,
                w: canvas.width * 0.7,
                h: 140
            };

            ball = {
                startX: canvas.width / 2,
                startY: canvas.height - 100,
                x: canvas.width / 2,
                y: canvas.height - 100,
                radius: 16,
                vx: 0,
                vy: 0,
                isFlicked: false
            };

            // Responsive scale keeper speed based on level/streak
            let baseKeeperSpeed = 3 + (streak * 0.75);
            keeper = {
                x: canvas.width / 2,
                y: 180,
                w: 40,
                h: 65,
                dir: 1,
                speed: Math.min(baseKeeperSpeed, 9), 
                state: 'idling', // 'idling', 'diving'
                targetX: canvas.width / 2
            };

            gameState = 'aiming'; // 'aiming', 'shooting', 'result'
        }

        // Touch handling (Flick mechanics)
        let touchStart = { x: 0, y: 0 };
        
        canvas.addEventListener('touchstart', (e) => {
            if (gameState !== 'aiming') return;
            touchStart.x = e.touches[0].clientX;
            touchStart.y = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', (e) => {
            if (gameState !== 'aiming') return;
            let touchEnd    = { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
            let diffX = touchEnd.x - touchStart.x;
            let diffY = touchEnd.y - touchStart.y;

            // Only register dynamic forward flicks
            if (diffY < -30) { 
                ball.vx = diffX * 0.06;
                ball.vy = diffY * 0.07;
                ball.isFlicked = true;
                gameState = 'shooting';

                // Keeper AI logic decides where to dive when player kicks
                keeper.state = 'diving';
                keeper.targetX = goal.x + Math.random() * goal.w;
            }
        });

        function update() {
            if (gameState === 'aiming') {
                // Keeper paces back and forth along the goal line
                keeper.x += keeper.speed * keeper.dir;
                if (keeper.x - keeper.w/2 < goal.x || keeper.x + keeper.w/2 > goal.x + goal.w) {
                    keeper.dir *= -1;
                }
            }

            if (gameState === 'shooting') {
                // Ball physics simulation
                ball.x += ball.vx;
                ball.y += ball.vy;
                
                // Scale ball radius down slightly to fake 3D perspective depth
                if (ball.radius > 9) ball.radius -= 0.15;

                // Keeper lunges or dives towards its determined target block
                if (keeper.state === 'diving') {
                    keeper.x += (keeper.targetX - keeper.x) * 0.15;
                }

                // Check for Save (Collision between Keeper and Ball)
                if (
                    ball.x > keeper.x - keeper.w/2 && ball.x < keeper.x + keeper.w/2 &&
                    ball.y > keeper.y - keeper.h/2 && ball.y < keeper.y + keeper.h/2
                ) {
                    processResult(false); // Saved!
                }

                // Check for Goal (Crossed line within goal structure)
                else if (ball.y <= goal.y + goal.h && ball.y >= goal.y) {
                    if (ball.x >= goal.x && ball.x <= goal.x + goal.w) {
                        processResult(true); // Goal scored!
                    } else {
                        processResult(false); // Missed wide!
                    }
                }
                
                // Missed over the crossbar completely
                else if (ball.y < goal.y) {
                    processResult(false);
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Penalty Box Markings
            ctx.strokeStyle = 'rgba(255,255,255,0.4)';
            ctx.lineWidth = 4;
            ctx.strokeRect(canvas.width * 0.05, 0, canvas.width * 0.9, goal.y + 200);
            
            // Penalty Spot
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.beginPath();
            ctx.arc(canvas.width/2, canvas.height - 100, 6, 0, Math.PI * 2);
            ctx.fill();

            // Draw Goal Post Netting Frame
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 6;
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.fillRect(goal.x, goal.y, goal.w, goal.h);
            ctx.strokeRect(goal.x, goal.y, goal.w, goal.h);

            // Draw Goalkeeper Avatar
            ctx.fillStyle = '#ff5722'; // Keepers kit
            ctx.fillRect(keeper.x - keeper.w/2, keeper.y - keeper.h/2, keeper.w, keeper.h);
            // Keeper head
            ctx.fillStyle = '#ffdbac';
            ctx.beginPath();
            ctx.arc(keeper.x, keeper.y - keeper.h/2 - 2, 10, 0, Math.PI*2);
            ctx.fill();

            // Draw Match Ball
            ctx.fillStyle = '#fff';
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            
            // Draw Ball Pattern detail
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius * 0.3, 0, Math.PI * 2);
            ctx.fill();

            // Display Feedback overlay (GOAL or MISS)
            if (gameState === 'result') {
                ctx.fillStyle = feedbackColor;
                ctx.font = 'bold 40px sans-serif';
                ctx.textAlign = 'center';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#000';
                ctx.fillText(feedbackText, canvas.width / 2, canvas.height / 2);
                ctx.shadowBlur = 0;
            }
        }

        let feedbackText = "";
        let feedbackColor = "#fff";

        function processResult(isGoal) {
            gameState = 'result';
            if (isGoal) {
                score++;
                streak++;
                feedbackText = "GOAL!";
                feedbackColor = "#4CD964";
            } else {
                feedbackText = "SAVED / MISSED!";
                feedbackColor = "#FF3B30";
                streak = 0; // Break current streak tracking
                setTimeout(endGame, 1200);
                return;
            }

            // Sync score engine UI data
            document.getElementById('uiScore').innerText = score;
            document.getElementById('uiStreak').innerText = streak;

            // Reset engine environment after delay to attempt next shot
            setTimeout(() => {
                initEntities();
            }, 1500);
        }

        function gameLoop() {
            update();
            draw();
            if (gameState !== 'over') {
                requestAnimationFrame(gameLoop);
            }
        }

        function startGame() {
            document.getElementById('selectorScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            document.getElementById('uiTeam').innerText = selectedNation.flag + " " + selectedNation.name;
            
            score = 0;
            streak = 0;
            document.getElementById('uiScore').innerText = score;
            document.getElementById('uiStreak').innerText = streak;
            
            initEntities();
            gameLoop();
        }

        function endGame() {
            gameState = 'over';
            document.getElementById('finalScoreText').innerText = `You scored ${score} penalty goals for ${selectedNation.name}!`;
            document.getElementById('gameOverScreen').style.display = 'flex';
        }

        function showSelector() {
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('selectorScreen').style.display = 'flex';
        }
    </script>
</body>
</html>

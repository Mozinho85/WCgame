<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>World Cup Penalty Shootout</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b1a0e;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 100%;
            max-height: 750px;
            background: #1e3f20; 
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
        }

        /* Screen Styles */
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            background: linear-gradient(135deg, #124e28 0%, #072513 100%);
            box-sizing: border-box;
            padding: 20px;
            text-align: center;
            transition: opacity 0.3s ease;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 5px;
            margin-top: 0;
            text-shadow: 0 3px 6px rgba(0,0,0,0.5);
            color: #f7b500;
            letter-spacing: 1px;
        }

        p { margin: 5px 0 20px 0; color: #ddd; font-size: 15px;}

        /* Nation Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
            max-height: 420px;
            overflow-y: auto;
            padding: 10px;
            box-sizing: border-box;
        }

        .nation-btn {
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 14px;
            padding: 15px 5px;
            color: white;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .nation-btn:active, .nation-btn.selected {
            background: #f7b500;
            color: #072513;
            border-color: #fff;
            transform: scale(0.95);
            box-shadow: 0 0 12px rgba(247, 181, 0, 0.4);
        }

        .flag {
            font-size: 32px;
            line-height: 1;
        }

        /* UI elements */
        button.action-btn {
            background: #f7b500;
            color: #072513;
            border: none;
            padding: 14px 45px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        button.action-btn:active {
            transform: scale(0.98);
        }

        #ingameUI {
            position: absolute;
            top: 15px; width: 100%;
            display: flex;
            justify-content: space-around;
            font-size: 15px;
            font-weight: bold;
            z-index: 5;
            text-shadow: 1px 1px 4px #000;
            pointer-events: none;
            box-sizing: border-box;
            padding: 0 10px;
        }

        #ingameUI div {
            background: rgba(0, 0, 0, 0.4);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        #canvasContainer {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #instructions {
            position: absolute;
            bottom: 35px;
            width: 100%;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            color: rgba(255,255,255,0.85);
            text-shadow: 1px 1px 3px #000;
            pointer-events: none;
            z-index: 5;
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.6; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        
        <div id="selectorScreen" class="screen">
            <h1>WORLD CUP 2026</h1>
            <p>Select your nation to take the pitch</p>
            <div class="grid" id="nationGrid"></div>
            <button class="action-btn" id="startBtn" disabled style="opacity: 0.4;">PLAY</button>
        </div>

        <div id="ingameUI">
            <div>TEAM: <span id="uiTeam" style="color: #f7b500;">---</span></div>
            <div>SCORE: <span id="uiScore" style="color: #4CD964;">0</span></div>
            <div>STREAK: <span id="uiStreak" style="color: #5ac8fa;">0</span></div>
        </div>
        <div id="instructions">Flick the ball fast towards the net!</div>
        
        <div id="canvasContainer">
            <canvas id="gameCanvas"></canvas>
        </div>

        <div id="gameOverScreen" class="screen" style="display: none;">
            <h1 style="color: #ff3333; text-shadow: 0 0 10px rgba(255,51,51,0.3);">OUT OF THE CUP!</h1>
            <p id="finalScoreText" style="font-size: 18px;">You scored 0 penalties.</p>
            <button class="action-btn" onclick="showSelector()">TRY AGAIN</button>
        </div>

    </div>

    <script>
        const nations = [
            { name: 'Argentina', flag: '🇦🇷', color: '#74ACDF' },
            { name: 'Brazil', flag: '🇧🇷', color: '#009c3b' },
            { name: 'England', flag: '🏴󠁧󠁢󠁥󠁮󠁧󠁿', color: '#ce1124' },
            { name: 'France', flag: '🇫🇷', color: '#002395' },
            { name: 'Germany', flag: '🇩🇪', color: '#111111' },
            { name: 'Spain', flag: '🇪🇸', color: '#c60b1e' },
            { name: 'USA', flag: '🇺🇸', color: '#0a3161' },
            { name: 'Mexico', flag: '🇲🇽', color: '#006847' },
            { name: 'Portugal', flag: '🇵🇹', color: '#ff0000' }
        ];

        let selectedNation = null;
        let score = 0;
        let streak = 0;

        const grid = document.getElementById('nationGrid');
        const startBtn = document.getElementById('startBtn');

        nations.forEach(nation => {
            const btn = document.createElement('div');
            btn.className = 'nation-btn';
            btn.innerHTML = `<span class="flag">${nation.flag}</span><span>${nation.name}</span>`;
            btn.addEventListener('click', () => {
                document.querySelectorAll('.nation-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedNation = nation;
                startBtn.disabled = false;
                startBtn.style.opacity = "1";
            });
            grid.appendChild(btn);
        });

        startBtn.addEventListener('click', startGame);

        // --- ENGINE & GAMEPLAY ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let ball, keeper, goal, gameState;
        
        function initEntities() {
            goal = {
                x: canvas.width * 0.15,
                y: 140,
                w: canvas.width * 0.7,
                h: 130
            };

            ball = {
                startX: canvas.width / 2,
                startY: canvas.height - 120,
                x: canvas.width / 2,
                y: canvas.height - 120,
                radius: 18,
                vx: 0,
                vy: 0,
                baseRadius: 18
            };

            let baseKeeperSpeed = 3.5 + (streak * 0.6);
            keeper = {
                x: canvas.width / 2,
                y: 195,
                w: 44,
                h: 70,
                dir: Math.random() < 0.5 ? 1 : -1,
                speed: Math.min(baseKeeperSpeed, 9.5), 
                state: 'idling', 
                targetX: canvas.width / 2
            };

            gameState = 'aiming';
        }

        // Touch & Mouse Support (Flick Framework)
        let touchStart = { x: 0, y: 0 };
        let touchTime = 0;
        
        function handleStart(x, y) {
            if (gameState !== 'aiming') return;
            touchStart.x = x;
            touchStart.y = y;
            touchTime = Date.now();
        }

        function handleEnd(x, y) {
            if (gameState !== 'aiming') return;
            let diffX = x - touchStart.x;
            let diffY = y - touchStart.y;
            let duration = Date.now() - touchTime;

            // Ensure it's a quick forward flick gesture
            if (diffY < -40 && duration < 400) { 
                // Normalize speeds across variable screen lengths
                ball.vx = diffX * 0.05;
                ball.vy = diffY * 0.06;
                gameState = 'shooting';

                keeper.state = 'diving';
                // AI dives to random zone near where ball is tracking
                let diveBias = (ball.vx * 15);
                keeper.targetX = Math.max(goal.x, Math.min(goal.x + goal.w, (canvas.width / 2) + diveBias + (Math.random() * 80 - 40)));
            }
        }

        canvas.addEventListener('touchstart', (e) => handleStart(e.touches[0].clientX, e.touches[0].clientY));
        canvas.addEventListener('touchend', (e) => handleEnd(e.changedTouches[0].clientX, e.changedTouches[0].clientY));
        
        // Desktop Fallbacks for easier testing
        canvas.addEventListener('mousedown', (e) => handleStart(e.clientX, e.clientY));
        canvas.addEventListener('mouseup', (e) => handleEnd(e.clientX, e.clientY));

        function update() {
            if (gameState === 'aiming') {
                keeper.x += keeper.speed * keeper.dir;
                if (keeper.x - keeper.w/2 < goal.x || keeper.x + keeper.w/2 > goal.x + goal.w) {
                    keeper.dir *= -1;
                    keeper.x = keeper.x - keeper.w/2 < goal.x ? goal.x + keeper.w/2 : goal.x + goal.w - keeper.w/2;
                }
            }

            if (gameState === 'shooting') {
                ball.x += ball.vx;
                ball.y += ball.vy;
                
                // 3D Matrix Perspective Scaling Simulation
                if (ball.radius > 9) {
                    ball.radius -= 0.18;
                }

                if (keeper.state === 'diving') {
                    keeper.x += (keeper.targetX - keeper.x) * 0.18;
                }

                // Hitbox Collision Calculation (Goalkeeper vs Ball)
                if (
                    ball.y <= keeper.y + keeper.h/2 && ball.y >= keeper.y - keeper.h/2 &&
                    ball.x >= keeper.x - keeper.w/2 && ball.x <= keeper.x + keeper.w/2
                ) {
                    processResult(false); 
                }
                // Goal Line Logic Boundary Crossing Checking
                else if (ball.y <= goal.y + goal.h && ball.y >= goal.y - 10) {
                    if (ball.x >= goal.x && ball.x <= goal.x + goal.w) {
                        processResult(true); 
                    } else {
                        processResult(false); 
                    }
                }
                // Out of bounds / Over Crossbar
                else if (ball.y < goal.y - 10) {
                    processResult(false);
                }
            }
        }

        function draw() {
            // Draw Stadium Background Ground Grass
            let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, '#143516');
            grad.addColorStop(0.5, '#1e3f20');
            grad.addColorStop(1, '#27542a');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Penalty Penalty Area Paint Markings
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 4;
            ctx.strokeRect(canvas.width * 0.05, -50, canvas.width * 0.9, goal.y + 240);
            
            // Penalty Spot Circle Marker
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.beginPath();
            ctx.arc(canvas.width/2, canvas.height - 120, 6, 0, Math.PI * 2);
            ctx.fill();

            // Draw Goal Netting Structure Base
            ctx.strokeStyle = 'rgba(255,255,255,0.8)';
            ctx.lineWidth = 6;
            ctx.fillStyle = 'rgba(255,255,255,0.12)';
            ctx.fillRect(goal.x, goal.y, goal.w, goal.h);
            ctx.strokeRect(goal.x, goal.y, goal.w, goal.h);

            // Draw Goalkeeper Body Configuration
            ctx.fillStyle = selectedNation ? selectedNation.color : '#ff5722'; 
            ctx.lineWidth = 1;
            // Torso
            ctx.fillRect(keeper.x - keeper.w/2, keeper.y - keeper.h/3, keeper.w, keeper.h * 0.7);
            // Alternate Color Sleeves / Shorts Line
            ctx.fillStyle = '#111';
            ctx.fillRect(keeper.x - keeper.w/2, keeper.y + keeper.h*0.2, keeper.w, 5);
            
            // Goalkeeper Head Graphic
            ctx.fillStyle = '#ffdbac';
            ctx.beginPath();
            ctx.arc(keeper.x, keeper.y - keeper.h/3 - 4, 11, 0, Math.PI*2);
            ctx.fill();

            // Draw Dynamic Soccer Ball Shadow Core
            ctx.fillStyle = 'rgba(0,0,0,0.25)';
            ctx.beginPath();
            let shadowOffset = (canvas.height - ball.y) * 0.1;
            ctx.arc(ball.x, ball.y + shadowOffset, ball.radius * 0.9, 0, Math.PI * 2);
            ctx.fill();

            // Render Match Football Graphics
            ctx.fillStyle = '#ffffff';
            ctx.strokeStyle = '#222222';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, Math.max(ball.radius, 4), 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            
            // Ball Traditional Panel Design Pattern Detail Accent Rings
            ctx.fillStyle = '#111';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, Math.max(ball.radius * 0.35, 1.5), 0, Math.PI * 2);
            ctx.fill();

            // Draw Dynamic Feedback Messaging Screen Layouts
            if (gameState === 'result') {
                ctx.fillStyle = feedbackColor;
                ctx.font = 'bold 44px sans-serif';
                ctx.textAlign = 'center';
                ctx.shadowBlur = 8;
                ctx.shadowColor = 'rgba(0,0,0,0.6)';
                ctx.fillText(feedbackText, canvas.width / 2, canvas.height * 0.55);
                ctx.shadowBlur = 0;
            }
        }

        let feedbackText = "";
        let feedbackColor = "#fff";

        function processResult(isGoal) {
            gameState = 'result';
            if (isGoal) {
                score++;
                streak++;
                feedbackText = "GOAL!";
                feedbackColor = "#4CD964";
                
                document.getElementById('uiScore').innerText = score;
                document.getElementById('uiStreak').innerText = streak;
                
                setTimeout(() => {
                    initEntities();
                }, 1400);
            } else {
                feedbackText = "SAVED / MISSED!";
                feedbackColor = "#FF3B30";
                setTimeout(endGame, 1400);
            }
        }

        function gameLoop() {
            update();
            draw();
            if (gameState !== 'over') {
                requestAnimationFrame(gameLoop);
            }
        }

        function startGame() {
            document.getElementById('selectorScreen').style.display = 'none';
            document.getElementById('uiTeam').innerText = selectedNation.flag + " " + selectedNation.name;
            
            score = 0;
            streak = 0;
            document.getElementById('uiScore').innerText = score;
            document.getElementById('uiStreak').innerText = streak;
            
            initEntities();
            gameLoop();
        }

        function endGame() {
            gameState = 'over';
            document.getElementById('finalScoreText').innerText = `You scored ${score} goals for ${selectedNation.name}!`;
            document.getElementById('gameOverScreen').style.display = 'flex';
        }

        function showSelector() {
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('selectorScreen').style.display = 'flex';
        }

        // Initialize view sizing constraints properly
        resizeCanvas();
    </script>
</body>
</html>
